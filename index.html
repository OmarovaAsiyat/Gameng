<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Vocabulary Match · Elementary Unit 1</title>
<style>
  :root {
    --purple: #534AB7;
    --purple-light: #EEEDFE;
    --purple-mid: #AFA9EC;
    --teal: #1D9E75;
    --teal-light: #E1F5EE;
    --coral: #D85A30;
    --coral-light: #FAECE7;
    --gray-bg: #F8F7F4;
    --gray-border: #E2E0D8;
    --text: #1a1a18;
    --text-muted: #6b6a64;
    --radius: 14px;
    --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--gray-bg);
    min-height: 100dvh;
    color: var(--text);
  }

  /* ── Header ── */
  .header {
    background: white;
    border-bottom: 1px solid var(--gray-border);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .logo-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--purple); display: inline-block; }
  .header h1 { font-size: 15px; font-weight: 600; }
  .header-sub { font-size: 12px; color: var(--text-muted); margin-top: 1px; }
  .score-badge {
    background: var(--purple-light);
    color: var(--purple);
    font-size: 13px;
    font-weight: 600;
    padding: 6px 14px;
    border-radius: 20px;
  }

  /* ── Progress bar ── */
  .progress-wrap { background: var(--gray-border); height: 4px; }
  .progress-bar {
    height: 4px;
    background: var(--purple);
    transition: width 0.4s ease;
    width: 0%;
  }

  /* ── Timer ── */
  .timer-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 16px 20px 4px;
  }
  .timer-track {
    flex: 1;
    max-width: 340px;
    height: 6px;
    background: var(--gray-border);
    border-radius: 3px;
    overflow: hidden;
  }
  .timer-fill {
    height: 100%;
    border-radius: 3px;
    background: var(--teal);
    transition: width 0.1s linear, background 0.3s;
  }
  .timer-label {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-muted);
    min-width: 28px;
    text-align: right;
  }

  /* ── Question ── */
  .question-wrap {
    padding: 20px 20px 8px;
    text-align: center;
  }
  .question-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--text-muted);
    margin-bottom: 10px;
  }
  .question-word {
    font-size: 32px;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: var(--text);
    min-height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .question-hint {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 6px;
  }

  /* ── Answer grid ── */
  .answers {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    padding: 16px 20px 24px;
    max-width: 460px;
    margin: 0 auto;
  }
  .answer-btn {
    background: white;
    border: 1.5px solid var(--gray-border);
    border-radius: var(--radius);
    padding: 18px 12px;
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
    cursor: pointer;
    transition: transform 0.1s, border-color 0.15s, background 0.15s;
    line-height: 1.3;
    min-height: 64px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    -webkit-user-select: none;
    user-select: none;
  }
  .answer-btn:active { transform: scale(0.96); }
  .answer-btn.correct {
    background: var(--teal-light);
    border-color: var(--teal);
    color: #085041;
  }
  .answer-btn.wrong {
    background: var(--coral-light);
    border-color: var(--coral);
    color: #712B13;
  }
  .answer-btn.disabled { pointer-events: none; opacity: 0.5; }
  .answer-btn.reveal { background: var(--teal-light); border-color: var(--teal); opacity: 0.7; }

  /* ── Feedback toast ── */
  .feedback {
    text-align: center;
    font-size: 16px;
    font-weight: 600;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.3s;
  }
  .feedback.correct { color: var(--teal); }
  .feedback.wrong { color: var(--coral); }

  /* ── Round counter ── */
  .round-info {
    text-align: center;
    font-size: 12px;
    color: var(--text-muted);
    padding: 0 20px 8px;
  }

  /* ── End screen ── */
  .end-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    text-align: center;
    min-height: 70dvh;
  }
  .end-screen.show { display: flex; }
  .end-emoji { font-size: 52px; margin-bottom: 16px; }
  .end-title { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
  .end-sub { font-size: 15px; color: var(--text-muted); margin-bottom: 28px; line-height: 1.5; }
  .end-stats {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    width: 100%;
    max-width: 340px;
    margin-bottom: 32px;
  }
  .stat-card {
    background: white;
    border: 1px solid var(--gray-border);
    border-radius: var(--radius-sm);
    padding: 14px 8px;
  }
  .stat-num { font-size: 24px; font-weight: 700; color: var(--purple); }
  .stat-lbl { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .btn-primary {
    background: var(--purple);
    color: white;
    border: none;
    border-radius: var(--radius);
    padding: 16px 36px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
    max-width: 340px;
    margin-bottom: 12px;
  }
  .btn-secondary {
    background: white;
    color: var(--purple);
    border: 1.5px solid var(--purple-mid);
    border-radius: var(--radius);
    padding: 14px 36px;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    width: 100%;
    max-width: 340px;
  }

  /* ── Game area ── */
  #game { display: block; }
  #end { display: none; }
  #end.show { display: flex; flex-direction: column; align-items: center; padding: 40px 24px; text-align: center; }

  /* ── Shake animation ── */
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20% { transform: translateX(-6px); }
    40% { transform: translateX(6px); }
    60% { transform: translateX(-4px); }
    80% { transform: translateX(4px); }
  }
  .shake { animation: shake 0.35s ease; }

  @keyframes pop {
    0% { transform: scale(1); }
    50% { transform: scale(1.06); }
    100% { transform: scale(1); }
  }
  .pop { animation: pop 0.25s ease; }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-left">
    <span class="logo-dot"></span>
    <div>
      <div class="header h1" style="font-size:15px;font-weight:600;">EF Games</div>
      <div class="header-sub">Elementary · Unit 1</div>
    </div>
  </div>
  <div class="score-badge">⭐ <span id="score-display">0</span></div>
</div>
<div class="progress-wrap"><div class="progress-bar" id="progress"></div></div>

<!-- Game area -->
<div id="game">
  <div class="timer-row">
    <div class="timer-track"><div class="timer-fill" id="timer-fill"></div></div>
    <div class="timer-label" id="timer-label">10</div>
  </div>

  <div class="question-wrap">
    <div class="question-label">What does this word mean?</div>
    <div class="question-word" id="question-word">—</div>
    <div class="question-hint" id="question-hint"></div>
  </div>

  <div class="round-info" id="round-info">Question 1 of 10</div>
  <div class="feedback" id="feedback"></div>

  <div class="answers" id="answers"></div>
</div>

<!-- End screen -->
<div id="end">
  <div class="end-emoji" id="end-emoji">🎉</div>
  <div class="end-title" id="end-title">Well done!</div>
  <div class="end-sub" id="end-sub"></div>
  <div class="end-stats">
    <div class="stat-card">
      <div class="stat-num" id="stat-score">0</div>
      <div class="stat-lbl">Points</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="stat-correct">0</div>
      <div class="stat-lbl">Correct</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="stat-time">0s</div>
      <div class="stat-lbl">Best time</div>
    </div>
  </div>
  <button class="btn-primary" onclick="restartGame()">Play again</button>
  <button class="btn-secondary" onclick="changeDifficulty()">Change difficulty</button>
</div>

<script>
// ── Vocabulary data: Elementary Unit 1 (English File 4th ed.)
const ALL_VOCAB = [
  { word: "happy",       hint: "feeling/emotion",     answer: "счастливый" },
  { word: "sad",         hint: "feeling/emotion",     answer: "грустный" },
  { word: "tired",       hint: "feeling/emotion",     answer: "усталый" },
  { word: "hungry",      hint: "feeling/state",       answer: "голодный" },
  { word: "thirsty",     hint: "feeling/state",       answer: "хотеть пить" },
  { word: "cold",        hint: "feeling/temperature", answer: "холодный" },
  { word: "hot",         hint: "feeling/temperature", answer: "горячий" },
  { word: "ill",         hint: "health",              answer: "больной" },
  { word: "fine",        hint: "state/feeling",       answer: "хорошо" },
  { word: "late",        hint: "time",                answer: "опоздавший" },
  { word: "early",       hint: "time",                answer: "ранний" },
  { word: "right",       hint: "adjective",           answer: "правильный" },
  { word: "wrong",       hint: "adjective",           answer: "неправильный" },
  { word: "free",        hint: "state",               answer: "свободный" },
  { word: "busy",        hint: "state",               answer: "занятой" },
  { word: "open",        hint: "state/verb",          answer: "открытый" },
  { word: "closed",      hint: "state",               answer: "закрытый" },
  { word: "cheap",       hint: "price",               answer: "дешёвый" },
  { word: "expensive",   hint: "price",               answer: "дорогой" },
  { word: "easy",        hint: "difficulty",          answer: "лёгкий" },
  { word: "difficult",   hint: "difficulty",          answer: "сложный" },
  { word: "interesting", hint: "quality",             answer: "интересный" },
  { word: "boring",      hint: "quality",             answer: "скучный" },
  { word: "near",        hint: "distance",            answer: "близкий" },
  { word: "far",         hint: "distance",            answer: "далёкий" },
  { word: "big",         hint: "size",                answer: "большой" },
  { word: "small",       hint: "size",                answer: "маленький" },
  { word: "new",         hint: "age",                 answer: "новый" },
  { word: "old",         hint: "age",                 answer: "старый" },
  { word: "fast",        hint: "speed",               answer: "быстрый" },
];

// ── Settings
const QUESTIONS_PER_ROUND = 10;
const TIME_PER_QUESTION = 10; // seconds
const POINTS_BASE = 100;
const POINTS_SPEED_BONUS = 50; // max speed bonus

// ── State
let questions = [];
let currentQ = 0;
let score = 0;
let correctCount = 0;
let bestTime = TIME_PER_QUESTION;
let timerInterval = null;
let timeLeft = TIME_PER_QUESTION;
let answered = false;
let questionStartTime = 0;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildQuestions() {
  const pool = shuffle(ALL_VOCAB).slice(0, QUESTIONS_PER_ROUND);
  return pool.map(item => {
    const wrong = shuffle(ALL_VOCAB.filter(v => v.answer !== item.answer))
      .slice(0, 3)
      .map(v => v.answer);
    const options = shuffle([item.answer, ...wrong]);
    return { ...item, options };
  });
}

function startGame() {
  questions = buildQuestions();
  currentQ = 0;
  score = 0;
  correctCount = 0;
  bestTime = TIME_PER_QUESTION;
  document.getElementById('score-display').textContent = 0;
  document.getElementById('game').style.display = 'block';
  document.getElementById('end').classList.remove('show');
  document.getElementById('end').style.display = 'none';
  showQuestion();
}

function showQuestion() {
  if (currentQ >= questions.length) { endGame(); return; }

  answered = false;
  timeLeft = TIME_PER_QUESTION;
  questionStartTime = Date.now();

  const q = questions[currentQ];
  document.getElementById('question-word').textContent = q.word;
  document.getElementById('question-hint').textContent = q.hint;
  document.getElementById('round-info').textContent = `Question ${currentQ + 1} of ${QUESTIONS_PER_ROUND}`;
  document.getElementById('progress').style.width = ((currentQ / QUESTIONS_PER_ROUND) * 100) + '%';
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = 'feedback';

  // Render answer buttons
  const container = document.getElementById('answers');
  container.innerHTML = '';
  q.options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'answer-btn';
    btn.textContent = opt;
    btn.addEventListener('click', () => handleAnswer(btn, opt, q.answer));
    container.appendChild(btn);
  });

  // Start timer
  clearInterval(timerInterval);
  updateTimer();
  timerInterval = setInterval(() => {
    timeLeft -= 0.1;
    if (timeLeft <= 0) { timeLeft = 0; handleTimeout(); }
    updateTimer();
  }, 100);
}

function updateTimer() {
  const pct = (timeLeft / TIME_PER_QUESTION) * 100;
  const fill = document.getElementById('timer-fill');
  fill.style.width = pct + '%';
  fill.style.background = timeLeft > 5 ? '#1D9E75' : timeLeft > 3 ? '#EF9F27' : '#D85A30';
  document.getElementById('timer-label').textContent = Math.ceil(timeLeft);
}

function handleAnswer(btn, chosen, correct) {
  if (answered) return;
  answered = true;
  clearInterval(timerInterval);

  const elapsed = (Date.now() - questionStartTime) / 1000;
  const buttons = document.querySelectorAll('.answer-btn');

  if (chosen === correct) {
    btn.classList.add('correct', 'pop');
    const speedBonus = Math.round(POINTS_SPEED_BONUS * (timeLeft / TIME_PER_QUESTION));
    const gained = POINTS_BASE + speedBonus;
    score += gained;
    correctCount++;
    if (elapsed < bestTime) bestTime = elapsed;
    document.getElementById('score-display').textContent = score;
    showFeedback('correct', `+${gained} pts`);
  } else {
    btn.classList.add('wrong', 'shake');
    buttons.forEach(b => {
      if (b.textContent === correct) b.classList.add('reveal');
      else if (b !== btn) b.classList.add('disabled');
    });
    showFeedback('wrong', `The answer is: ${correct}`);
  }

  setTimeout(nextQuestion, 1400);
}

function handleTimeout() {
  if (answered) return;
  answered = true;
  clearInterval(timerInterval);
  const correct = questions[currentQ].answer;
  const buttons = document.querySelectorAll('.answer-btn');
  buttons.forEach(b => {
    if (b.textContent === correct) b.classList.add('reveal');
    else b.classList.add('disabled');
  });
  showFeedback('wrong', 'Time\'s up! The answer: ' + correct);
  setTimeout(nextQuestion, 1600);
}

function showFeedback(type, msg) {
  const el = document.getElementById('feedback');
  el.textContent = msg;
  el.className = 'feedback ' + type;
}

function nextQuestion() {
  currentQ++;
  showQuestion();
}

function endGame() {
  clearInterval(timerInterval);
  document.getElementById('game').style.display = 'none';
  const end = document.getElementById('end');
  end.style.display = 'flex';
  end.classList.add('show');

  const pct = Math.round((correctCount / QUESTIONS_PER_ROUND) * 100);
  let emoji = '😅', title = 'Keep practising!';
  if (pct >= 90) { emoji = '🏆'; title = 'Excellent!'; }
  else if (pct >= 70) { emoji = '🎉'; title = 'Well done!'; }
  else if (pct >= 50) { emoji = '👍'; title = 'Good effort!'; }

  document.getElementById('end-emoji').textContent = emoji;
  document.getElementById('end-title').textContent = title;
  document.getElementById('end-sub').textContent =
    `You got ${correctCount} out of ${QUESTIONS_PER_ROUND} correct (${pct}%). ${pct >= 70 ? 'Great job!' : 'Try again to improve your score!'}`;
  document.getElementById('stat-score').textContent = score;
  document.getElementById('stat-correct').textContent = `${correctCount}/${QUESTIONS_PER_ROUND}`;
  document.getElementById('stat-time').textContent = bestTime < TIME_PER_QUESTION ? bestTime.toFixed(1) + 's' : '—';

  document.getElementById('progress').style.width = '100%';
}

function restartGame() { startGame(); }
function changeDifficulty() { alert('More levels coming soon! 🚀'); }

// ── Start
startGame();
</script>
</body>
</html>
